<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Agendamento - VetCare Clinical</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Container principal */
        .booking-container {
            display: flex;
            width: 100%;
            max-width: 1050px;
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
            overflow: hidden;
        }

        /* LADO ESQUERDO: Formulário de Agendamento */
        .booking-form-side {
            flex: 1.2; /* Um pouco mais de espaço para os campos do agendamento */
            padding: 45px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .booking-form-side h2 {
            color: #1e293b;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .booking-form-side p.subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 28px;
        }

        /* Linha com dois campos lado a lado */
        .form-row {
            display: flex;
            gap: 16px;
        }

        .form-group {
            flex: 1;
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: #475569;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            color: #334155;
            background-color: #f8fafc;
            transition: all 0.2s;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #006653;
            background-color: #fff;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Botão Confirmar Agendamento */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #006653;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #004d3f;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
        }

        .back-link a {
            color: #64748b;
            text-decoration: none;
        }

        .back-link a:hover {
            color: #006653;
            text-decoration: underline;
        }

        /* LADO DIREITO: Card com Imagem e Texto */
        .image-side {
            flex: 0.9;
            background: linear-gradient(135deg, #b3d1cb 0%, #7da39a 100%);
            position: relative;
            padding: 48px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            min-height: 600px;
        }

        .image-text-container {
            position: relative;
            z-index: 1;
            color: #ffffff;
        }

        .image-side h1 {
            font-size: 34px;
            font-weight: 600;
            line-height: 1.2;
            margin-bottom: 16px;
        }

        .image-side p {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.5;
        }

        /* Responsividade para Celular */
        @media (max-width: 768px) {
            .booking-container {
                flex-direction: column-reverse;
            }
            .image-side {
                min-height: 200px;
                padding: 32px;
                justify-content: center;
            }
            .image-side h1 { font-size: 22px; }
            .booking-form-side { padding: 32px 24px; }
            .form-row { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>

    <div class="booking-container">
        
        <div class="booking-form-side">
            <h2>Agendar um Horário</h2>
            <p class="subtitle">Escolha o melhor momento para cuidar do seu pet.</p>

            <form action="/agendar" method="POST">
                
                <div class="form-group">
                    <label for="pet_selecionado">Selecione o Pet</label>
                    <select id="pet_selecionado" name="nome_pet" required>
                        <option value="" disabled selected>Escolha um pet...</option>
                        <option value="Thor">Thor (Golden Retriever)</option>
                        <option value="Rex">Rex (Vira-lata)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="servico">Serviço Desejado</label>
                    <select id="servico" name="servico" required>
                        <option value="" disabled selected>Selecione o serviço...</option>
                        <option value="Banho e Tosa">Banho e Tosa Completa</option>
                        <option value="Apenas Banho">Apenas Banho</option>
                        <option value="Consulta Veterinária">Consulta Veterinária</option>
                        <option value="Corte de Unhas">Corte de Unhas</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="data">Data</label>
                        <input type="date" id="data" name="data" required>
                    </div>

                    <div class="form-group">
                        <label for="hora">Horário</label>
                        <input type="time" id="hora" name="hora" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="observacoes">Observações / Recomendações Especiais</label>
                    <textarea id="observacoes" name="observacoes" placeholder="Ex: Tem medo de soprador, alergia a algum shampoo..."></textarea>
                </div>

                <button type="submit" class="btn-submit">Confirmar Agendamento</button>
            </form>

            <div class="back-link">
                <a href="#">← Voltar para o Painel</a>
            </div>
        </div>

        <div class="image-side">
            <div class="image-text-container">
                <h1>Praticidade para o seu dia a dia.</h1>
                <p>Agende serviços, acompanhe o histórico e garanta o bem-estar do seu melhor amigo em poucos cliques.</p>
            </div>
        </div>

    </div>

</body>
</html>
